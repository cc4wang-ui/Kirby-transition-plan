<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kirby 交接 — Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f0;--card:#fff;--border:#e5e5df;--text:#1a1a1a;--muted:#888;--accent:#534AB7;
--ws-a:#534AB7;--ws-b:#1D9E75;--ws-c:#378ADD;--ws-d:#BA7517;--crit:#E24B4A;
--ws-a-bg:#EEEDFE;--ws-b-bg:#E1F5EE;--ws-c-bg:#E6F1FB;--ws-d-bg:#FAEEDA;--crit-bg:#FCEBEB;
--done:#3B6D11;--done-bg:#EAF3DE;--prog:#185FA5;--prog-bg:#E6F1FB;
--font-body:'Noto Sans JP',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a1a1a;color:#ccc;padding:24px 0;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto}
.sidebar h1{font-size:14px;font-weight:600;color:#fff;padding:0 20px;margin-bottom:4px;font-family:var(--font-mono)}
.sidebar .sub{font-size:11px;color:#666;padding:0 20px;margin-bottom:28px}
.nav-item{display:block;width:100%;text-align:left;background:none;border:none;color:#999;font-size:13px;padding:10px 20px;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.1);border-left:2px solid var(--accent)}
.nav-item .tag{font-size:10px;background:var(--crit);color:#fff;padding:1px 6px;border-radius:8px;margin-left:6px}
.main{margin-left:220px;flex:1;padding:28px 32px;max-width:1100px}
.topbar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px}
.topbar h2{font-size:20px;font-weight:500}
.topbar .date{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.metric{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:16px 18px}
.metric .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric .val{font-size:28px;font-weight:600;font-family:var(--font-mono)}
.metric .sub{font-size:11px;color:var(--muted);margin-top:2px}
.section{display:none}
.section.active{display:block}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ws-dot{width:8px;height:8px;border-radius:2px;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-weight:500;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:top}
tr:hover{background:rgba(0,0,0,.015)}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.b-todo{background:#f0f0ea;color:#666}
.b-prog{background:var(--prog-bg);color:var(--prog)}
.b-done{background:var(--done-bg);color:var(--done)}
.b-crit{background:var(--crit-bg);color:var(--crit);font-weight:600}
.b-blocked{background:#fef2f2;color:#991b1b}
select.status-sel{font-size:11px;padding:3px 6px;border:0.5px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;font-family:var(--font-body)}
.gantt-container{overflow-x:auto;margin-top:12px}
.gantt{min-width:750px;position:relative}
.gantt-header{display:flex;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.gantt-label{width:200px;flex-shrink:0;font-size:11px;color:var(--muted)}
.gantt-timeline{flex:1;display:flex;position:relative}
.gantt-week{flex:1;text-align:center;font-size:10px;color:var(--muted);font-family:var(--font-mono)}
.gantt-row{display:flex;align-items:center;height:28px;border-bottom:0.5px solid rgba(0,0,0,.04)}
.gantt-row-label{width:200px;flex-shrink:0;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px}
.gantt-row-bar{flex:1;position:relative;height:16px}
.g-bar{position:absolute;height:12px;border-radius:3px;top:2px;opacity:.8;transition:opacity .15s}
.g-bar:hover{opacity:1}
.g-bar.done{opacity:.5}
.g-bar.crit-bar{outline:1.5px solid var(--crit);outline-offset:1px;opacity:1}
.g-today{position:absolute;top:0;bottom:0;width:1px;background:var(--crit);opacity:.5;z-index:1}
.risk-row{display:flex;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.risk-id{font-family:var(--font-mono);font-size:12px;font-weight:600;width:32px;flex-shrink:0}
.risk-body{flex:1}
.risk-title{font-weight:500;margin-bottom:4px}
.risk-meta{font-size:11px;color:var(--muted)}
.risk-impact{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-right:6px}
.ri-fatal{background:var(--crit-bg);color:var(--crit)}
.ri-high{background:#FFF7ED;color:#9A3412}
.ri-mid{background:#FEFCE8;color:#854D0E}
.week-card{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px}
.week-card h4{font-size:13px;font-weight:600;margin-bottom:8px;font-family:var(--font-mono)}
.week-card .wk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;font-size:12px}
.week-card .wk-col-label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.countdown{background:var(--crit-bg);border:1px solid var(--crit);border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--crit)}
.countdown strong{font-family:var(--font-mono);font-size:18px}
.progress-bar{height:6px;background:#e8e8e3;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:16px}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
<h1>mikai</h1>
<div class="sub">Kirby 交接 tracker</div>
<button class="nav-item active" data-tab="overview">Overview</button>
<button class="nav-item" data-tab="tasks">Task list</button>
<button class="nav-item" data-tab="gantt">Gantt chart</button>
<button class="nav-item" data-tab="risks">Risk register</button>
<button class="nav-item" data-tab="weekly">Weekly checkpoint</button>
<div style="padding:20px;margin-top:auto;font-size:10px;color:#444;position:absolute;bottom:0">
Last updated<br><span style="font-family:var(--font-mono)">2026-04-14</span>
</div>
</aside>

<main class="main">
<div class="topbar">
<h2 id="page-title">Overview</h2>
<div class="date">today: <span id="today-date"></span></div>
</div>

<div id="countdown" class="countdown"></div>

<div id="sec-overview" class="section active">
<div class="metrics" id="metric-cards"></div>

<div class="card">
<h3>Work stream progress</h3>
<div id="ws-progress"></div>
</div>

<div class="card">
<h3>This week's priorities</h3>
<div id="this-week"></div>
</div>
</div>

<div id="sec-tasks" class="section">
<div class="card" id="task-filters" style="padding:12px 20px;display:flex;gap:12px;align-items:center">
<span style="font-size:12px;color:var(--muted)">Filter:</span>
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="A" style="color:var(--ws-a)">A. Contract</button>
<button class="filter-btn" data-filter="B" style="color:var(--ws-b)">B. Org</button>
<button class="filter-btn" data-filter="C" style="color:var(--ws-c)">C. Strategy</button>
<button class="filter-btn" data-filter="D" style="color:var(--ws-d)">D. System</button>
</div>
<div class="card" style="overflow-x:auto">
<table>
<thead><tr><th>ID</th><th>Task</th><th>Owner</th><th>Depends</th><th>Start</th><th>End</th><th>Status</th><th style="width:80px">Progress</th></tr></thead>
<tbody id="task-tbody"></tbody>
</table>
</div>
</div>

<div id="sec-gantt" class="section">
<div class="card">
<div class="gantt-container">
<div class="gantt" id="gantt-chart"></div>
</div>
</div>
</div>

<div id="sec-risks" class="section">
<div class="card" id="risk-list"></div>
</div>

<div id="sec-weekly" class="section" id="weekly-list"></div>
</div>
</div>

<script>
const TASKS=[
{id:"A1",ws:"A",name:"完成全15份合約分析",owner:"Cross+AI",dep:"—",start:"2026-04-14",end:"2026-04-17",status:"進行中",pri:"P0",pct:53},
{id:"A2",ws:"A",name:"ナナホシナナ畢業合約",owner:"Cross+營業",dep:"A1",start:"2026-04-14",end:"2026-04-28",status:"急迫",pri:"P0",pct:0,crit:true},
{id:"A2.1",ws:"A",name:"└ 終止條款確認",owner:"Cross+AI",dep:"A1",start:"2026-04-14",end:"2026-04-16",status:"待開始",pri:"P0",pct:0},
{id:"A2.2",ws:"A",name:"└ 新業務委託起草",owner:"Cross+AI",dep:"A2.1",start:"2026-04-16",end:"2026-04-21",status:"待開始",pri:"P0",pct:0},
{id:"A2.3",ws:"A",name:"└ 與ナナ協商+簽約",owner:"Cross",dep:"A2.2",start:"2026-04-21",end:"2026-04-28",status:"待開始",pri:"P0",pct:0},
{id:"A2.4",ws:"A",name:"└ 營業部交接",owner:"Cross+營業",dep:"A2.3",start:"2026-04-25",end:"2026-04-30",status:"待開始",pri:"P0",pct:0},
{id:"A3",ws:"A",name:"薪酬結構轉換模型",owner:"Cross+AI",dep:"A1",start:"2026-04-17",end:"2026-04-25",status:"待開始",pri:"P0",pct:0},
{id:"A4",ws:"A",name:"RAG合約修正(底薪移除)",owner:"Cross",dep:"A3",start:"2026-04-25",end:"2026-05-15",status:"待開始",pri:"P1",pct:0},
{id:"A5",ws:"A",name:"主體變更17LIVE→mikai(8名)",owner:"Cross+法務",dep:"A1",start:"2026-04-25",end:"2026-05-23",status:"待開始",pri:"P1",pct:0},
{id:"A6",ws:"A",name:"全合約修正完成驗收",owner:"Cross",dep:"A4,A5",start:"2026-05-25",end:"2026-05-30",status:"待開始",pri:"P1",pct:0},
{id:"B1",ws:"B",name:"Talent績效數據收集",owner:"Cross+AI",dep:"D1",start:"2026-04-14",end:"2026-04-21",status:"進行中",pri:"P0",pct:0},
{id:"B2",ws:"B",name:"績效分層框架",owner:"Cross+AI",dep:"B1",start:"2026-04-21",end:"2026-04-28",status:"待開始",pri:"P0",pct:0},
{id:"B3",ws:"B",name:"Manager↔Talent重分配",owner:"Cross",dep:"B2",start:"2026-04-28",end:"2026-05-09",status:"待開始",pri:"P1",pct:0},
{id:"B4",ws:"B",name:"Franky↔Nal:be會談",owner:"Cross+Franky",dep:"—",start:"2026-04-21",end:"2026-04-25",status:"待開始",pri:"P1",pct:0},
{id:"B5",ws:"B",name:"Nal:be預算+內容計畫",owner:"Franky",dep:"B4",start:"2026-04-25",end:"2026-05-12",status:"待開始",pri:"P1",pct:0},
{id:"C1",ws:"C",name:"GGG+RAG內容戰略",owner:"Cross",dep:"B2",start:"2026-05-05",end:"2026-05-19",status:"待開始",pri:"P1",pct:0},
{id:"C2",ws:"C",name:"全面預算計畫",owner:"Cross+AI",dep:"A3,B3,B5",start:"2026-05-12",end:"2026-05-26",status:"待開始",pri:"P1",pct:0},
{id:"C3",ws:"C",name:"預算核准+執行",owner:"Cross",dep:"C2",start:"2026-05-26",end:"2026-05-30",status:"待開始",pri:"P0",pct:0},
{id:"D1",ws:"D",name:"YouTube API數據拉取",owner:"Cross+AI",dep:"—",start:"2026-04-14",end:"2026-04-21",status:"待開始",pri:"P1",pct:0},
{id:"D2",ws:"D",name:"Talent DB架構設計",owner:"Cross+AI",dep:"A1",start:"2026-04-21",end:"2026-05-05",status:"待開始",pri:"P2",pct:0},
{id:"D3",ws:"D",name:"ReAct DB整合",owner:"Engineering",dep:"D2",start:"2026-05-05",end:"2026-05-23",status:"待開始",pri:"P2",pct:0},
];

const RISKS=[
{id:"R1",title:"ナナホシナナ 4/30前未完成簽約",impact:"致命",prob:"中",tasks:"A2",mitigation:"本週啟動條款確認；預留法務快速通道；營業部提前briefing",trigger:"4/21前合約草案未完成"},
{id:"R2",title:"底薪移除導致talent流失",impact:"高",prob:"高",tasks:"A4",mitigation:"薪酬模型確保high performer ≥ 現行；個別談判策略；bonus補償",trigger:"任一talent明確反對"},
{id:"R3",title:"主體變更法務延遲",impact:"高",prob:"中",tasks:"A5",mitigation:"提前與17LIVE法務溝通；標準化合約範本；batch處理",trigger:"5/5前法務未開始審查"},
{id:"R4",title:"C2預算因上游延遲推遲",impact:"高",prob:"中",tasks:"C2,C3",mitigation:"A3/B3/B5設hard deadline；即使部分數據未到先建框架",trigger:"5/12前任一上游未完成"},
{id:"R5",title:"YouTube API數據不足",impact:"中",prob:"低",tasks:"B1,B2",mitigation:"補充17LIVE內部數據；加入manager定性評估",trigger:"API只返回公開數據"},
{id:"R6",title:"Franky接手能力/預算不足",impact:"中",prob:"中",tasks:"B4,B5",mitigation:"設定KPI+review checkpoint；預算設上限",trigger:"首月產出低於預期"},
{id:"R7",title:"工程資源不足做ReAct整合",impact:"中",prob:"高",tasks:"D3",mitigation:"確認headcount；降scope到MVP；延期到Phase 2",trigger:"5/5前無工程師assign"},
];

const WEEKS=[
{wk:"W1",dates:"4/14 — 4/18",deliverables:["A1 完成15份分析","A2.1 終止條款確認","D1 YouTube API啟動"],decisions:["ナナ抽成比例"],risks:["R1"]},
{wk:"W2",dates:"4/21 — 4/25",deliverables:["A2.2 合約起草","A3 薪酬模型","B1 績效數據到位","B4 Franky會談"],decisions:["Rev Share比例確定","Franky預算框架"],risks:["R2","R5"]},
{wk:"W3",dates:"4/28 — 5/2",deliverables:["A2.3 ナナ簽約 ⚠️","A2.4 營業部交接","B2 績效分層"],decisions:["ナナ 4/30 deadline","分層結果確認"],risks:["R1"]},
{wk:"W4",dates:"5/5 — 5/9",deliverables:["A4 RAG修正啟動","A5 主體變更啟動","C1 內容戰略開始","D3 ReAct開始"],decisions:["法務方案","戰略方向"],risks:["R3","R7"]},
{wk:"W5",dates:"5/12 — 5/16",deliverables:["B3 Manager重配","B5 Nal:be計畫","C2 預算啟動"],decisions:["Manager配置確認","Nal:be預算核准"],risks:["R4","R6"]},
{wk:"W6",dates:"5/19 — 5/23",deliverables:["A5 主體變更完成","C1 戰略完成","D3 ReAct完成"],decisions:["戰略確認","預算初版review"],risks:["R3"]},
{wk:"W7",dates:"5/26 — 5/30",deliverables:["A6 全合約驗收","C2 預算完成","C3 預算核准 ✅"],decisions:["最終預算核准","全計畫落地確認"],risks:[]},
];

const WS_COLORS={A:"#534AB7",B:"#1D9E75",C:"#378ADD",D:"#BA7517"};
const WS_BG={A:"#EEEDFE",B:"#E1F5EE",C:"#E6F1FB",D:"#FAEEDA"};
const WS_NAMES={A:"合約重整",B:"組織重配",C:"策略制定",D:"系統建設"};
const STATUS_CLASS={"待開始":"b-todo","進行中":"b-prog","完成":"b-done","急迫":"b-crit","阻塞":"b-blocked"};
const STATUSES=["待開始","進行中","完成","急迫","阻塞"];
const PROJECT_START=new Date("2026-04-14");
const PROJECT_END=new Date("2026-05-30");
const NANA_DEADLINE=new Date("2026-04-30");
const TODAY=new Date();
const TOTAL_DAYS=(PROJECT_END-PROJECT_START)/(864e5);

function loadState(){try{return JSON.parse(localStorage.getItem("kirby-tracker"))||{}}catch(e){return{}}}
function saveState(s){localStorage.setItem("kirby-tracker",JSON.stringify(s))}
function getTaskState(){
const s=loadState();
return TASKS.map(t=>({...t,status:s[t.id+"_s"]||t.status,pct:s[t.id+"_p"]!=null?s[t.id+"_p"]:t.pct}))
}
function setTaskField(id,field,val){const s=loadState();s[id+"_"+field]=val;saveState(s);render()}

function daysBetween(a,b){return Math.ceil((new Date(b)-new Date(a))/864e5)}
function daysFromStart(d){return Math.max(0,(new Date(d)-PROJECT_START)/864e5)}

document.getElementById("today-date").textContent=TODAY.toISOString().slice(0,10);

const nanaDays=Math.max(0,Math.ceil((NANA_DEADLINE-TODAY)/864e5));
document.getElementById("countdown").innerHTML=`<strong>${nanaDays}</strong> days until ナナホシナナ graduation deadline (4/30)`;

function renderMetrics(){
const tasks=getTaskState();
const done=tasks.filter(t=>t.status==="完成").length;
const crit=tasks.filter(t=>t.status==="急迫"||t.status==="阻塞").length;
const avgPct=Math.round(tasks.reduce((s,t)=>s+t.pct,0)/tasks.length);
const el=document.getElementById("metric-cards");
el.innerHTML=[
{label:"Total tasks",val:tasks.length,sub:`${done} completed`},
{label:"Overall progress",val:avgPct+"%",sub:`${tasks.length-done} remaining`},
{label:"Critical items",val:crit,sub:crit>0?"needs attention":"all clear"},
{label:"Days remaining",val:Math.max(0,Math.ceil((PROJECT_END-TODAY)/864e5)),sub:`deadline: 5/30`}
].map(m=>`<div class="metric"><div class="label">${m.label}</div><div class="val">${m.val}</div><div class="sub">${m.sub}</div></div>`).join("")
}

function renderWSProgress(){
const tasks=getTaskState();
const el=document.getElementById("ws-progress");
el.innerHTML=Object.entries(WS_NAMES).map(([k,name])=>{
const wsTasks=tasks.filter(t=>t.ws===k);
const avg=wsTasks.length?Math.round(wsTasks.reduce((s,t)=>s+t.pct,0)/wsTasks.length):0;
const done=wsTasks.filter(t=>t.status==="完成").length;
return `<div style="margin-bottom:14px">
<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
<span style="font-size:13px"><span class="ws-dot" style="background:${WS_COLORS[k]}"></span> ${k}. ${name}</span>
<span style="font-size:12px;font-family:var(--font-mono);color:var(--muted)">${avg}% — ${done}/${wsTasks.length}</span>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${avg}%;background:${WS_COLORS[k]}"></div></div>
</div>`}).join("")
}

function renderThisWeek(){
const el=document.getElementById("this-week");
const currentWeek=WEEKS.find(w=>{
const[start]=w.dates.split(" — ");
const ws=new Date("2026-"+start.replace("/","-"));
const we=new Date(ws);we.setDate(we.getDate()+6);
return TODAY>=ws&&TODAY<=we
})||WEEKS[0];
el.innerHTML=`<div style="font-size:13px;font-family:var(--font-mono);color:var(--accent);margin-bottom:10px">${currentWeek.wk} | ${currentWeek.dates}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:12px">
<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Deliverables</div>${currentWeek.deliverables.map(d=>`<div style="padding:3px 0">${d}</div>`).join("")}</div>
<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Decisions needed</div>${currentWeek.decisions.map(d=>`<div style="padding:3px 0">${d}</div>`).join("")}</div>
</div>`
}

function renderTasks(filter="all"){
const tasks=getTaskState();
const filtered=filter==="all"?tasks:tasks.filter(t=>t.ws===filter);
const tbody=document.getElementById("task-tbody");
tbody.innerHTML=filtered.map(t=>{
const cls=STATUS_CLASS[t.status]||"b-todo";
const wsColor=WS_COLORS[t.ws];
return `<tr>
<td style="font-family:var(--font-mono);font-weight:600;color:${wsColor};font-size:12px">${t.id}</td>
<td style="font-size:12px">${t.name}</td>
<td style="font-size:11px;color:var(--muted)">${t.owner}</td>
<td style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">${t.dep}</td>
<td style="font-size:11px;font-family:var(--font-mono)">${t.start.slice(5)}</td>
<td style="font-size:11px;font-family:var(--font-mono)">${t.end.slice(5)}</td>
<td><select class="status-sel" onchange="setTaskField('${t.id}','s',this.value)">${STATUSES.map(s=>`<option${s===t.status?" selected":""}>${s}</option>`).join("")}</select></td>
<td><input type="range" min="0" max="100" value="${t.pct}" style="width:60px;vertical-align:middle" oninput="setTaskField('${t.id}','p',+this.value)"><span style="font-size:10px;font-family:var(--font-mono);margin-left:4px">${t.pct}%</span></td>
</tr>`}).join("")
}

function renderGantt(){
const tasks=getTaskState();
const weeks=[];
let d=new Date(PROJECT_START);
while(d<=PROJECT_END){weeks.push(d.toISOString().slice(5,10));d=new Date(d);d.setDate(d.getDate()+7)}
const todayPct=Math.min(100,Math.max(0,(daysFromStart(TODAY)/TOTAL_DAYS)*100));
const el=document.getElementById("gantt-chart");
el.innerHTML=`<div class="gantt-header"><div class="gantt-label"></div><div class="gantt-timeline">${weeks.map(w=>`<div class="gantt-week">${w}</div>`).join("")}</div></div>
<div style="position:relative">
<div class="g-today" style="left:calc(200px + (100% - 200px) * ${todayPct/100})"></div>
${tasks.map(t=>{
const startPct=(daysFromStart(t.start)/TOTAL_DAYS)*100;
const durPct=((new Date(t.end)-new Date(t.start))/(864e5)/TOTAL_DAYS)*100;
const color=WS_COLORS[t.ws];
const critClass=t.crit?"crit-bar":"";
const doneClass=t.status==="完成"?"done":"";
return `<div class="gantt-row">
<div class="gantt-row-label" style="color:${color}">${t.id} ${t.name}</div>
<div class="gantt-row-bar"><div class="g-bar ${critClass} ${doneClass}" style="left:${startPct}%;width:${durPct}%;background:${color}" title="${t.name}: ${t.start} → ${t.end}"></div></div>
</div>`}).join("")}
</div>`
}

function renderRisks(){
const el=document.getElementById("risk-list");
el.innerHTML=`<h3>Risk register</h3>`+RISKS.map(r=>{
const impClass=r.impact==="致命"?"ri-fatal":r.impact==="高"?"ri-high":"ri-mid";
return `<div class="risk-row">
<div class="risk-id">${r.id}</div>
<div class="risk-body">
<div class="risk-title">${r.title}</div>
<div><span class="risk-impact ${impClass}">${r.impact}</span><span class="risk-impact" style="background:#f0f0ea;color:#666">prob: ${r.prob}</span><span style="font-size:11px;color:var(--muted)">tasks: ${r.tasks}</span></div>
<div style="font-size:12px;margin-top:6px"><strong style="font-size:11px">緩解:</strong> ${r.mitigation}</div>
<div style="font-size:11px;color:var(--crit);margin-top:4px">trigger: ${r.trigger}</div>
</div></div>`}).join("")
}

function renderWeekly(){
const el=document.getElementById("sec-weekly");
el.innerHTML=WEEKS.map(w=>`<div class="week-card">
<h4>${w.wk} <span style="font-weight:400;color:var(--muted)">${w.dates}</span></h4>
<div class="wk-grid">
<div><div class="wk-col-label">Deliverables</div>${w.deliverables.map(d=>`<div style="padding:2px 0;font-size:12px">${d}</div>`).join("")}</div>
<div><div class="wk-col-label">Decisions</div>${w.decisions.map(d=>`<div style="padding:2px 0;font-size:12px">${d}</div>`).join("")}</div>
<div><div class="wk-col-label">Risk check</div>${w.risks.map(r=>`<div style="padding:2px 0;font-size:12px;color:var(--crit)">${r}</div>`).join("")||'<div style="font-size:12px;color:var(--done)">—</div>'}</div>
</div></div>`).join("")
}

function render(){renderMetrics();renderWSProgress();renderThisWeek();renderTasks();renderGantt();renderRisks();renderWeekly()}

document.querySelectorAll(".nav-item").forEach(btn=>{
btn.addEventListener("click",()=>{
document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
const tab=btn.dataset.tab;
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("sec-"+tab).classList.add("active");
document.getElementById("page-title").textContent=btn.textContent.trim();
})
});

document.querySelectorAll(".filter-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
renderTasks(btn.dataset.filter);
})
});

document.querySelectorAll(".filter-btn").forEach(b=>{
b.style.cssText="font-size:12px;padding:4px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;font-family:var(--font-body)";
});

render();
</script>
</body>
</html>
